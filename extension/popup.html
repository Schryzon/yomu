<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            width: 300px;
            padding: 20px;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: #818cf8; /* Brand Primary */
        }
        .status {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #2dd4bf;
            border-radius: 50%;
            box-shadow: 0 0 10px #2dd4bf;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .btn {
            background: #818cf8;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.4;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">ヨォム yōmu!</div>
    </div>
    
    <div class="status" id="status-text">
        <div class="status-dot"></div>
        Ready to enhance your reading.
    </div>

    <div class="section-title">Actions</div>
    <div class="control-group">
        <button class="btn" id="scan-now">Re-scan Page</button>
        <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" id="open-demo">Open Web Demo</button>
    </div>

    <div class="footer">
        yōmu! v1.0 • Built with Gemini Flash-latest

    </div>

    <script src="popup.js"></script>
</body>
</html>
